services:
  web:
    platform: linux/amd64
    build:
      context: ./website
      dockerfile: DevDockerfile
    ports:
      - "3000:3000"
    stdin_open: true
  service:
    platform: linux/amd64
    build:
      context: ./service
      dockerfile: DevDockerfile
    ports:
      - "4000:4000"
      - "9230:9229"
    env_file: azurite_localdb.env
    environment:
      - NODE_OPTIONS=--trace-deprecation
      - APPINSIGHTS_EXPORT_LOG_LEVEL=debug
      - LOGGER_LOG_TO_CONSOLE=true
      - CACHING_PROVIDER=redis
      - CACHING_REDIS_SERVICE=redis
      - CACHING_REDIS_PORT=6379
      - CACHING_REDIS_TLS=false
    entrypoint:
      - "node"
      - "--inspect=0.0.0.0:9229"
      - "./bin/www"
    links:
      - clearlydefined_mongo_db
      - crawler
      - azurite
      - redis
    depends_on:
      redis:
        condition: service_healthy
  crawler:
    platform: linux/amd64
    build:
      context: ./crawler
      dockerfile: DevDockerfile
    env_file: azurite_localdb.env
    environment:
      - CRAWLER_ECHO=true
    ports:
      - "5000:5000"
      - "9229:9229"
    entrypoint:
      - "node"
      - "--inspect=0.0.0.0:9229"
      - "./index.js"
    links:
      - azurite
  azurite:
    image: "mcr.microsoft.com/azure-storage/azurite"
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck"
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - ./azurite_data:/data
  clearlydefined_mongo_db:
    image: "mongo:4.4.28"
    #image: "mongo:5.0.6"
    ports:
      - "27017:27017"
  clearlydefined_mongo_seed:
    image: "clearlydefined/docker_dev_env_experiment_clearlydefined_mongo_seed"
    links:
      - clearlydefined_mongo_db
  redis:
    image: "redis:6.0.14-alpine"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
